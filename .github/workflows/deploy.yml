name: Deploy
run-name: 'deploy(${{ github.event.workflow_run.head_branch }}): deploying `${{ github.event.workflow_run.head_sha }}`'

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Allow one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  gh-pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    permissions:
      id-token: write
      pages: write

    steps:
      - name: Set up
        id: dist
        uses: actions/download-artifact@v8
        with:
          name: static-build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Prepare
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.dist.outputs.download-path }}
          include-hidden-files: true

      - name: Deploy
        id: deployed
        uses: actions/deploy-pages@v5
        with:
          token: ${{ github.token }}
